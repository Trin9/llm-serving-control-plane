services:
  mock-vllm:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "8000:8000"
    environment:
      - SERVED_MODEL_NAME=mock-model
    command: ["python", "scripts/mock_vllm.py"]
    networks:
      - llm-network
    deploy:
      resources:
        limits:
          memory: 2G # Adjust based on mock_vllm needs
        reservations:
          memory: 1G

  gate-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - VLLM_URL=http://mock-vllm:8000/v1/chat/completions # Point to the mock-vllm service
      - VLLM_URLS=http://mock-vllm:8000/v1/chat/completions # For consistent hash router
      - BILLING_SERVICE_ENABLED=true # Enable billing locally
    depends_on:
      - mock-vllm
    networks:
      - llm-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.42.0 # Use a stable Prometheus version
    ports:
      - "9090:9090"
    volumes:
      - ./monitor/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml # Mount a local prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle' # Enable /-/reload endpoint
    networks:
      - llm-network
    depends_on:
      - gate-service # Prometheus scrapes gate-service

  grafana:
    image: grafana/grafana:9.4.7 # Use a stable Grafana version
    ports:
      - "3000:3000"
    volumes:
      - ./monitor/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources # Provision datasource
      - ./monitor/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards # Provision dashboards
      - ./monitor/grafana/dashboards:/var/lib/grafana/dashboards # Mount dashboards JSON
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default admin password
      - GF_SERVER_ROOT_URL=http://localhost:3000
    networks:
      - llm-network
    depends_on:
      - prometheus

networks:
  llm-network:
    driver: bridge
