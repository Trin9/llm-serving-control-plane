apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "llm-operator.fullname" . }}-manager-role
  labels:
    {{- include "llm-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - serving.trin.io
  resources:
  - inferenceservices
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - serving.trin.io
  resources:
  - inferenceservices/finalizers
  verbs:
  - update
- apiGroups:
  - serving.trin.io
  resources:
  - inferenceservices/status
  verbs:
  - get
  - patch
  - update
